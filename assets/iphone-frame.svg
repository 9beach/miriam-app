<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" fill="none">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="35%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
    <mask id="frame-cutout">
      <rect width="360" height="780" fill="white"/>
      <rect x="11" y="11" width="338" height="758" rx="39" ry="39" fill="black"/>
    </mask>
  </defs>

  <!-- Body bezel with screen cutout -->
  <rect width="360" height="780" rx="48" ry="48" fill="url(#bezel)" mask="url(#frame-cutout)"/>

  <!-- Outer rim highlight (catches light) -->
  <rect x="0.5" y="0.5" width="359" height="779" rx="47.5" ry="47.5"
        fill="none" stroke="url(#rim)" stroke-width="1"/>

  <!-- Inner screen edge (subtle inset shadow line where bezel meets screen) -->
  <rect x="10.5" y="10.5" width="339" height="759" rx="39.5" ry="39.5"
        fill="none" stroke="#000000" stroke-opacity="0.55" stroke-width="1"/>

  <!-- Dynamic Island -->
  <rect x="125" y="22" width="110" height="30" rx="15" ry="15" fill="#000000"/>

  <!-- Side buttons (left: action + volume up + volume down) -->
  <rect x="0" y="180" width="1.5" height="34" fill="#0a0a0c"/>
  <rect x="0" y="234" width="1.5" height="56" fill="#0a0a0c"/>
  <rect x="0" y="300" width="1.5" height="56" fill="#0a0a0c"/>

  <!-- Side buttons (right: camera control + side button) -->
  <rect x="358.5" y="200" width="1.5" height="34" fill="#0a0a0c"/>
  <rect x="358.5" y="270" width="1.5" height="74" fill="#0a0a0c"/>
</svg>
